<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dotcomphoto</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 4px;
    }

    .tab {
      padding: 10px 24px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: 9px;
      transition: all 0.3s ease;
    }

    .tab:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .tab.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .scroll-container {
      height: 500vh;
      position: relative;
    }

    canvas {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      display: block;
    }

    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      transition: opacity 0.5s;
    }

    .loading.done {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.1s;
    }

    .scroll-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 10;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .scroll-hint.hidden {
      opacity: 0;
    }

    .scroll-hint span {
      display: block;
      text-align: center;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-text">Loading frames</div>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loadingFill"></div>
    </div>
  </div>

  <header>
    <div class="tabs">
      <button class="tab active" data-video="0">Video 1</button>
      <button class="tab" data-video="1">Video 2</button>
      <button class="tab" data-video="2">Video 3</button>
      <button class="tab" data-video="3">Video 4</button>
      <button class="tab" data-video="4">Video 5</button>
      <button class="tab" data-video="5">Video 6</button>
    </div>
  </header>

  <div class="scroll-container">
    <canvas id="canvas"></canvas>
  </div>

  <div class="scroll-hint" id="scrollHint">
    <span>Scroll to play</span>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loading = document.getElementById('loading');
    const loadingFill = document.getElementById('loadingFill');
    const scrollHint = document.getElementById('scrollHint');
    const tabs = document.querySelectorAll('.tab');

    const videos = [
      { folder: 'frames',  totalFrames: 144, frames: [] },
      { folder: 'frames6', totalFrames: 144, frames: [] },
      { folder: 'frames7', totalFrames: 121, frames: [] },
      { folder: 'frames8', totalFrames: 144, frames: [] },
      { folder: 'frames9', totalFrames: 122, frames: [] },
      { folder: 'frames10', totalFrames: 122, frames: [] },
    ];

    let activeVideo = 0;
    let currentFrame = 0;
    let totalToLoad = videos.reduce((sum, v) => sum + v.totalFrames, 0);
    let totalLoaded = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawFrame(currentFrame);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Preload all frames for all videos
    function preloadAllFrames() {
      videos.forEach((video) => {
        for (let i = 1; i <= video.totalFrames; i++) {
          const img = new Image();
          img.onload = () => {
            totalLoaded++;
            loadingFill.style.width = (totalLoaded / totalToLoad * 100) + '%';
            if (totalLoaded === totalToLoad) {
              loading.classList.add('done');
              drawFrame(0);
            }
          };
          img.src = `${video.folder}/frame_${String(i).padStart(4, '0')}.jpg`;
          video.frames[i - 1] = img;
        }
      });
    }

    function drawFrame(index) {
      const vid = videos[activeVideo];
      const safeIndex = Math.min(index, vid.totalFrames - 1);
      const img = vid.frames[safeIndex];
      if (!img || !img.complete) return;

      const canvasRatio = canvas.width / canvas.height;
      const imgRatio = img.width / img.height;
      let drawW, drawH, drawX, drawY;

      if (imgRatio > canvasRatio) {
        drawH = canvas.height;
        drawW = img.width * (canvas.height / img.height);
        drawX = (canvas.width - drawW) / 2;
        drawY = 0;
      } else {
        drawW = canvas.width;
        drawH = img.height * (canvas.width / img.width);
        drawX = 0;
        drawY = (canvas.height - drawH) / 2;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, drawX, drawY, drawW, drawH);
    }

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const videoIndex = parseInt(tab.dataset.video);
        if (videoIndex === activeVideo) return;

        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeVideo = videoIndex;

        window.scrollTo({ top: 0, behavior: 'instant' });
        currentFrame = 0;
        drawFrame(0);
      });
    });

    // Scroll handler
    let hintHidden = false;

    function updateFrame() {
      const vid = videos[activeVideo];
      const scrollTop = window.scrollY;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const scrollFraction = scrollTop / maxScroll;
      const frameIndex = Math.min(
        Math.floor(scrollFraction * vid.totalFrames),
        vid.totalFrames - 1
      );
      currentFrame = frameIndex;
      drawFrame(currentFrame);
    }

    window.addEventListener('scroll', () => {
      if (!hintHidden && window.scrollY > 50) {
        scrollHint.classList.add('hidden');
        hintHidden = true;
      }
      requestAnimationFrame(updateFrame);
    });

    preloadAllFrames();
  </script>
</body>
</html>
